<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeerNow — Restablecer contraseña</title>
  <style>
    body { font-family: sans-serif; background: #F7F4EC; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 18px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { color: #10233E; font-size: 24px; margin-bottom: 12px; }
    p { color: #6B85A8; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; background: #10233E; color: #fff; padding: 14px 28px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 16px; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍺 BeerNow</h1>
    <p>Pulsa el botón para abrir la app y crear tu nueva contraseña.</p>
    <a id="btn" class="btn" href="#">Abrir BeerNow</a>
    <p style="margin-top:24px;font-size:13px;color:#aaa">
      Si el botón no funciona, asegúrate de tener BeerNow instalada.
    </p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      document.getElementById('btn').href = 'beermap://reset-password?token=' + token;
    } else {
      document.querySelector('p').textContent = 'Enlace inválido o expirado.';
      document.getElementById('btn').style.display = 'none';
    }
  </script>
</body>
</html>
